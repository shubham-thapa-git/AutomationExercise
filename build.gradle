plugins {
    id 'java'
}

repositories {
    mavenCentral()
}
dependencies {
    //TestNG dependency
    // Source: https://mvnrepository.com/artifact/org.testng/testng
testImplementation("org.testng:testng:7.11.0")

    // Selenium dependency
    // Source: https://mvnrepository.com/artifact/org.seleniumhq.selenium/selenium-java
implementation("org.seleniumhq.selenium:selenium-java:4.41.0")

//WebDriverManager dependency
// Source: https://mvnrepository.com/artifact/io.github.bonigarcia/webdrivermanager
implementation("io.github.bonigarcia:webdrivermanager:6.3.3")
//RestAssured dependency
// Source: https://mvnrepository.com/artifact/io.rest-assured/rest-assured
testImplementation("io.rest-assured:rest-assured:6.0.0")
}
test {
    useTestNG()


    // Forward JVM system properties to the Test JVM
    systemProperty "browser", System.getProperty("browser")
    systemProperty "headless", System.getProperty("headless")

    
    doFirst {
        println "Gradle browser: ${System.getProperty('browser')}"
        println "Gradle headless: ${System.getProperty('headless')}"
    }

    testLogging {
        events "PASSED", "FAILED", "SKIPPED"
        exceptionFormat "FULL"
        showStandardStreams = true
    }
}